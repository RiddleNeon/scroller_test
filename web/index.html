<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="wurp">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>wurp</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
<script src="flutter_bootstrap.js" async></script>

<script type="module">
  import {
    pipeline,
    env
  } from 'https://cdn.jsdelivr.net/npm/@huggingface/transformers@3.0.0';

  env.useBrowserCache = true;
  env.allowLocalModels  = false;

  let transcriber = null;

  async function loadWhisper(onProgress) {
    if (transcriber) return transcriber;
    transcriber = await pipeline(
            'automatic-speech-recognition',
            'Xenova/whisper-small',
            {
              progress_callback: (p) => {
                if (onProgress && p.progress != null)
                  onProgress(Math.round(p.progress));
              }
            }
    );
    return transcriber;
  }
  
  window.transcribeAudio = async function(audioBlob, language, prompt, onProgress) {
    try {
      const pipe = await loadWhisper(onProgress);

      const arrayBuffer = await audioBlob.arrayBuffer();
      const audioCtx   = new AudioContext({ sampleRate: 16000 });
      const decoded    = await audioCtx.decodeAudioData(arrayBuffer);
      const samples    = decoded.getChannelData(0); // Mono Float32Array

      const result = await pipe(samples, {
        language:             language || 'english',
        task:                 'transcribe',
        return_timestamps:    true,
        chunk_length_s:       30,
        stride_length_s:      5,
        initial_prompt:       prompt || '',
        num_beams:            5,
        no_repeat_ngram_size: 3,
        temperature:          0.3,
      });

      return JSON.stringify({ success: true, data: result });
    } catch (e) {
      return JSON.stringify({ success: false, error: e.message });
    }
  };
  
  window.extractAudioFromVideo = async function(videoFile) {
    try {
      const url         = URL.createObjectURL(videoFile);
      const response    = await fetch(url);
      const arrayBuffer = await response.arrayBuffer();
      URL.revokeObjectURL(url);

      const audioCtx    = new OfflineAudioContext(1, 1, 44100);
      const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);

      return _audioBufferToWav(audioBuffer);
    } catch (e) {
      console.error('Audio-Extraktion fehlgeschlagen:', e);
      return null;
    }
  };

  function _audioBufferToWav(buffer) {
    const samples    = buffer.getChannelData(0);
    const sampleRate = buffer.sampleRate;
    const wavBuffer  = new ArrayBuffer(44 + samples.length * 2);
    const view       = new DataView(wavBuffer);

    const str = (off, s) => { for (let i = 0; i < s.length; i++) view.setUint8(off + i, s.charCodeAt(i)); };
    str(0,  'RIFF');  view.setUint32(4,  36 + samples.length * 2, true);
    str(8,  'WAVE');  str(12, 'fmt ');
    view.setUint32(16, 16, true);
    view.setUint16(20, 1,  true);   // PCM
    view.setUint16(22, 1,  true);   // Mono
    view.setUint32(24, sampleRate,      true);
    view.setUint32(28, sampleRate * 2,  true);
    view.setUint16(32, 2,  true);
    view.setUint16(34, 16, true);
    str(36, 'data');  view.setUint32(40, samples.length * 2, true);

    for (let i = 0; i < samples.length; i++) {
      const s = Math.max(-1, Math.min(1, samples[i]));
      view.setInt16(44 + i * 2, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
    }

    return new Blob([wavBuffer], { type: 'audio/wav' });
  }

  console.log('[wurp] Whisper.js bereit');
</script>
</body>
</html>
