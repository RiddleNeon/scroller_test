name: Flutter Web to GitHub Pages

on:
  push:
    branches: [ master ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4 

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'

      - run: flutter config --enable-web

      - run: flutter build web --release --base-href /scroller_test/ --dart-define=RICK_URL=${{secrets.RICK_URL}} --dart-define=HAMSTER_URL=${{secrets.HAMSTER_URL}} --dart-define=SUPABASE_URL=${{secrets.SUPABASE_URL}} --dart-define=SUPABASE_ANON_KEY=${{secrets.SUPABASE_ANON_KEY}} --dart-define=CLOUDINARY_CLOUD_NAME=${{secrets.CLOUDINARY_CLOUD_NAME}}
      - run: cp web/coi-serviceworker.js build/web/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - uses: actions/deploy-pages@v4
