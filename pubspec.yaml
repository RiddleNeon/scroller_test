name: wurp
description: A new Flutter project.

publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter


  video_player: ^2.11.0
  fvp: ^0.35.2
  cupertino_icons: ^1.0.8
  font_awesome_flutter: ^10.12.0
  flutter_login: ^6.0.0
  preload_page_view: ^0.2.0
  lottie: ^3.3.0
  cached_network_image: ^3.0.0
  shimmer_animation: ^2.2.2+1
  file_picker: ^11.0.2
  camera: ^0.12.0
  vector_math: ^2.2.0
  http: ^1.6.0
  supabase_flutter: ^2.12.0
  
  go_router: ^17.1.0
  flutter_colorpicker: ^1.1.0
  flutter_web_file_saver: ^2.0.0
  uuid: ^4.5.3
  youtube_player_iframe: ^5.2.2
  custom_youtube_player: ^1.1.0
  webview_flutter: ^4.13.1
  url_launcher: ^6.3.2
  pointer_interceptor: ^0.10.1+2
  crypto: ^3.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: "^0.14.4"

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  remove_alpha_ios: true
  image_path: "assets/icon.png"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/icon.png"
    background_color: "#x000000"
    theme_color: "#0x000000"
  windows:
    generate: true
    image_path: "assets/icon.png"
    icon_size: 48 # min:48, max:256, default: 48
  macos:
    generate: true
    image_path: "assets/icon.png"

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  assets:
    - assets/like.json
    - assets/pixabay_videos.json
    - assets/youtube_videos_single.json
    - assets/youtube_videos.json
    - assets/quests.json
    - assets/all_cloudinary_image_urls
    - assets/icon.png
    - assets/
  shaders:
    - shaders/dotted_background.frag